<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    نظام التنبؤ الأكاديمي - تسجيل الدخول
  </title>

  <!-- Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap"
    rel="stylesheet"
  />

  <!-- Icons -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
  />

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {

      font-family: 'Cairo', sans-serif;

      min-height: 100vh;

      background:
        linear-gradient(
          160deg,
          #1a237e 0%,
          #0d47a1 40%,
          #1565c0 100%
        );

      display: flex;
      align-items: center;
      justify-content: center;

      padding: 20px;

      overflow: hidden;

      position: relative;
    }

    body::before {

      content: '';

      position: fixed;

      top: -120px;
      left: -120px;

      width: 400px;
      height: 400px;

      border-radius: 50%;

      background: rgba(255,255,255,0.04);
    }

    body::after {

      content: '';

      position: fixed;

      bottom: -120px;
      right: -120px;

      width: 350px;
      height: 350px;

      border-radius: 50%;

      background: rgba(255,255,255,0.04);
    }

    .login-card {

      width: 100%;
      max-width: 440px;

      background: white;

      border-radius: 24px;

      padding: 48px 42px;

      position: relative;

      z-index: 2;

      box-shadow:
        0 20px 60px rgba(0,0,0,0.35);
    }

    .card-accent {

      position: absolute;

      top: 0;
      right: 0;
      left: 0;

      height: 6px;

      border-radius: 24px 24px 0 0;

      background:
        linear-gradient(
          90deg,
          #c62828,
          #e53935,
          #ef9a9a
        );
    }

    .login-header {

      text-align: center;

      margin-bottom: 34px;
    }

    .login-icon {

      width: 84px;
      height: 84px;

      margin: 0 auto 18px;

      border-radius: 22px;

      display: flex;
      align-items: center;
      justify-content: center;

      background:
        linear-gradient(
          135deg,
          #1a237e,
          #1565c0
        );

      box-shadow:
        0 10px 30px rgba(21,101,192,0.35);
    }

    .login-icon i {

      font-size: 38px;

      color: white;
    }

    .login-title {

      font-size: 26px;
      font-weight: 800;

      color: #1a237e;

      margin-bottom: 8px;
    }

    .login-subtitle {

      color: #757575;

      font-size: 14px;
    }

    .form-group {

      margin-bottom: 20px;
    }

    .form-group label {

      display: block;

      margin-bottom: 8px;

      color: #424242;

      font-weight: 700;

      font-size: 14px;
    }

    .input-wrap {

      position: relative;
    }

    .input-wrap input {

      width: 100%;

      padding:
        14px
        46px
        14px
        16px;

      border:
        2px solid #e0e0e0;

      border-radius: 12px;

      font-size: 15px;

      font-family: inherit;

      background: #fafafa;

      outline: none;

      transition: all 0.25s;
    }

    .input-wrap input:focus {

      border-color: #1565c0;

      background: white;

      box-shadow:
        0 0 0 4px rgba(21,101,192,0.1);
    }

    .input-wrap i.icon {

      position: absolute;

      right: 14px;
      top: 50%;

      transform: translateY(-50%);

      color: #9e9e9e;
    }

    .toggle-pass {

      position: absolute;

      left: 14px;
      top: 50%;

      transform: translateY(-50%);

      cursor: pointer;

      color: #9e9e9e;
    }

    .btn-login {

      width: 100%;

      padding: 14px;

      border: none;

      border-radius: 12px;

      font-family: inherit;

      font-size: 17px;

      font-weight: 800;

      color: white;

      cursor: pointer;

      transition: all 0.25s;

      background:
        linear-gradient(
          135deg,
          #c62828,
          #e53935
        );

      box-shadow:
        0 8px 24px rgba(198,40,40,0.35);
    }

    .btn-login:hover {

      transform: translateY(-2px);

      box-shadow:
        0 12px 30px rgba(198,40,40,0.45);
    }

    .alert {

      margin-top: 18px;

      padding: 12px 16px;

      border-radius: 12px;

      display: none;

      align-items: center;

      gap: 10px;

      font-size: 14px;

      font-weight: 700;
    }

    .alert.success {

      background: #e8f5e9;

      color: #1b5e20;

      border: 1px solid #a5d6a7;
    }

    .alert.error {

      background: #ffebee;

      color: #b71c1c;

      border: 1px solid #ef9a9a;
    }

    .footer {

      margin-top: 26px;

      text-align: center;

      color: #9e9e9e;

      font-size: 12px;
    }

    @media (max-width: 480px) {

      .login-card {

        padding: 36px 24px;
      }

      .login-title {

        font-size: 22px;
      }
    }

  </style>

</head>

<body>

  <div class="login-card">

    <div class="card-accent"></div>

    <div class="login-header">

      <div class="login-icon">
        <i class="fas fa-graduation-cap"></i>
      </div>

      <h1 class="login-title">
        نظام التنبؤ الأكاديمي
      </h1>

      <p class="login-subtitle">
        الكشف المبكر عن التعثر · تحليلات التعلم المتقدمة
      </p>

    </div>

    <!-- LOGIN FORM -->
    <form id="loginForm">

      <div class="form-group">

        <label>اسم المستخدم</label>

        <div class="input-wrap">

          <input
            type="text"
            id="username"
            placeholder="اسم المستخدم"
            autocomplete="username"
          />

          <i class="fas fa-user icon"></i>

        </div>

      </div>

      <div class="form-group">

        <label>كلمة المرور</label>

        <div class="input-wrap">

          <input
            type="password"
            id="password"
            placeholder="كلمة المرور"
            autocomplete="current-password"
          />

          <i class="fas fa-lock icon"></i>

          <span
            class="toggle-pass"
            onclick="togglePassword()"
          >
            <i class="fas fa-eye" id="eyeIcon"></i>
          </span>

        </div>

      </div>

      <button
        type="submit"
        class="btn-login"
        id="loginBtn"
      >
        <i class="fas fa-sign-in-alt"></i>
        دخول
      </button>

      <div class="alert" id="alertBox">

        <i
          class="fas"
          id="alertIcon"
        ></i>

        <span id="alertText"></span>

      </div>

    </form>

    <div class="footer">

      نظام التنبؤ المبكر بالتعثر الأكاديمي
      <br />

      جامعة القصيم &copy; 2026

    </div>

  </div>

  <script>

    const DEMO_USER = 'Admin';
    const DEMO_PASS = '1447';

    const form =
      document.getElementById('loginForm');

    form.addEventListener(
      'submit',
      handleLogin
    );

    function handleLogin(e) {

      e.preventDefault();

      const username =
        document.getElementById('username')
        .value
        .trim();

      const password =
        document.getElementById('password')
        .value
        .trim();

      const alertBox =
        document.getElementById('alertBox');

      const alertIcon =
        document.getElementById('alertIcon');

      const alertText =
        document.getElementById('alertText');

      const loginBtn =
        document.getElementById('loginBtn');

      loginBtn.disabled = true;

      loginBtn.innerHTML =
        '<i class="fas fa-spinner fa-spin"></i> جارٍ التحقق...';

      setTimeout(() => {

        if (
          username === DEMO_USER &&
          password === DEMO_PASS
        ) {

          alertBox.className =
            'alert success';

          alertBox.style.display =
            'flex';

          alertIcon.className =
            'fas fa-check-circle';

          alertText.textContent =
            'تم تسجيل الدخول بنجاح';

          loginBtn.innerHTML =
            '<i class="fas fa-check"></i> تم الدخول';

          sessionStorage.setItem(
            'academic_auth',
            'true'
          );

          setTimeout(() => {

            window.location.href =
              'dashboard.html';

          }, 1000);

        } else {

          alertBox.className =
            'alert error';

          alertBox.style.display =
            'flex';

          alertIcon.className =
            'fas fa-times-circle';

          alertText.textContent =
            'بيانات الدخول غير صحيحة';

          loginBtn.disabled = false;

          loginBtn.innerHTML =
            '<i class="fas fa-sign-in-alt"></i> دخول';
        }

      }, 700);
    }

    function togglePassword() {

      const input =
        document.getElementById('password');

      const eyeIcon =
        document.getElementById('eyeIcon');

      if (input.type === 'password') {

        input.type = 'text';

        eyeIcon.className =
          'fas fa-eye-slash';

      } else {

        input.type = 'password';

        eyeIcon.className =
          'fas fa-eye';
      }
    }

  </script>

</body>
</html>
